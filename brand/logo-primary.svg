      <path d="M0,-90 C14,-76 18,-50 0,-30 C-18,-50 -14,-76 0,-90 Z" fill="#F0BE55" opacity="0.55"/>
    </g>
  </defs>

  <!-- icon -->
  <g transform="translate(240 220)">
