  <!-- wordmark -->
  <g fill="#1F1B16" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="240" y="450" font-size="60" font-weight="700" letter-spacing="4">BEE CREEK</text>
    <text x="240" y="510" font-size="60" font-weight="700" letter-spacing="4">FARM</text>
  </g>
  <!-- divider line -->
  <line x1="160" y1="535" x2="320" y2="535" stroke="#1F1B16" stroke-width="2"/>
  <text x="240" y="565" fill="#1F1B16" font-family="Georgia, serif" font-size="22" letter-spacing="8" text-anchor="middle">MASON, TX</text>
