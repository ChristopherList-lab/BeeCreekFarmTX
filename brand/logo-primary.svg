      <use href="#petal-p" transform="rotate(45)"/>
      <use href="#petal-p" transform="rotate(90)"/>
      <use href="#petal-p" transform="rotate(135)"/>
      <use href="#petal-p" transform="rotate(180)"/>
      <use href="#petal-p" transform="rotate(225)"/>
      <use href="#petal-p" transform="rotate(270)"/>
      <use href="#petal-p" transform="rotate(315)"/>
    </g>
    <ellipse cx="-18" cy="-10" rx="16" ry="10" fill="#F4EFE3" opacity="0.92" transform="rotate(-22 -18 -10)"/>
    <ellipse cx="18"  cy="-10" rx="16" ry="10" fill="#F4EFE3" opacity="0.92" transform="rotate(22 18 -10)"/>
    <ellipse cx="-18" cy="-10" rx="16" ry="10" fill="none" stroke="#1F1B16" stroke-width="2" transform="rotate(-22 -18 -10)"/>
    <ellipse cx="18"  cy="-10" rx="16" ry="10" fill="none" stroke="#1F1B16" stroke-width="2" transform="rotate(22 18 -10)"/>
    <ellipse cx="0" cy="6" rx="22" ry="28" fill="#E5A93A"/>
    <path d="M-19,-4 Q0,-12 19,-4" stroke="#1F1B16" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-21,8 Q0,2 21,8" stroke="#1F1B16" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-18,20 Q0,16 18,20" stroke="#1F1B16" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M0,32 L-4,40 L4,40 Z" fill="#1F1B16"/>
    <circle cx="0" cy="-26" r="11" fill="#1F1B16"/>
    <path d="M-4,-36 Q-9,-46 -12,-50" stroke="#1F1B16" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M4,-36 Q9,-46 12,-50" stroke="#1F1B16" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle cx="-12" cy="-50" r="2.2" fill="#1F1B16"/>
    <circle cx="12"  cy="-50" r="2.2" fill="#1F1B16"/>
